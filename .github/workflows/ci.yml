name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  mobile-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm install
      - run: npx tsc --noEmit
        working-directory: mobile

  web-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm install
      - run: npx prisma generate
        working-directory: web
      - run: npm run typecheck
        working-directory: web

  web-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm install
      - run: npm rebuild @tailwindcss/oxide || true
      - run: npm run build
        working-directory: web
